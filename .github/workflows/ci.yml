name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend-check:
    name: Frontend · check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc -b --noEmit
        working-directory: frontend

  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  rust-fmt:
    name: Rust · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-checks:
    name: Rust · clippy & test
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            protobuf-compiler clang libclang-dev libpam0g-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  rust-build:
    name: Rust · build release
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            protobuf-compiler clang libclang-dev libpam0g-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/lyra-agent
            target/release/lyra-backend
          retention-days: 7

  package:
    name: Package · systemd archives
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: target/release
      - name: Build archives
        run: |
          chmod +x target/release/lyra-agent target/release/lyra-backend

          VERSION="${GITHUB_SHA::7}"
          [[ "$GITHUB_REF_TYPE" == "tag" ]] && VERSION="${GITHUB_REF_NAME}"

          PKG="lyra-agent-${VERSION}-linux-x86_64"
          mkdir -p "$PKG"
          cp target/release/lyra-agent "$PKG/"
          cp agent/packaging/lyra-agent.service agent/packaging/install.sh agent/packaging/uninstall.sh "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG"

          PKG="lyra-backend-${VERSION}-linux-x86_64"
          mkdir -p "$PKG"
          cp target/release/lyra-backend "$PKG/"
          cp backend/packaging/lyra-backend.service backend/packaging/install.sh backend/packaging/uninstall.sh "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: lyra-*-linux-x86_64.tar.gz
          retention-days: 30

  docker-backend:
    name: Docker · build & push
    runs-on: ubuntu-latest
    needs: [rust-checks, rust-build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  docker-frontend:
    name: Docker · build & push (frontend)
    runs-on: ubuntu-latest
    needs: frontend-check
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
      - uses: softprops/action-gh-release@v2
        with:
          files: lyra-*-linux-x86_64.tar.gz
          generate_release_notes: true
